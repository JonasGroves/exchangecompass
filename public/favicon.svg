<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#5b4fff"/>
  <!-- Compass circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Cardinal tick marks -->
  <line x1="32" y1="13" x2="32" y2="17" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="47" x2="32" y2="51" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="32" x2="17" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="51" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- North needle (orange) -->
  <polygon points="32,16 35,32 32,36 29,32" fill="#ff6b35"/>
  <!-- South needle (white) -->
  <polygon points="32,48 35,32 32,36 29,32" fill="rgba(255,255,255,0.55)"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="2.5" fill="#ffffff"/>
</svg>
